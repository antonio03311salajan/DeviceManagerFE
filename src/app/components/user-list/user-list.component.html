<div class="container">
  <div class="header">
    <h1>Manage Users</h1>
    <button class="btn-add">Add New User</button>
  </div>

  @if (loading) {
    <p>Loading users...</p>
  } @else {
    <table class="user-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Location</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (user of users; track user.userId) {
          <tr>
            <td>{{ user.name }}</td>
            <td>
              <span class="role-badge">{{ user.role }}</span>
            </td>
            <td>{{ user.location }}</td>
            <td>
              <button class="btn-delete" (click)="deleteUser(user.userId)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="4">No users found in database.</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
