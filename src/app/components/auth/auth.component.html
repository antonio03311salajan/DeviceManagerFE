<section class="auth-wrapper">
  <div class="auth-card" aria-live="polite">
    <h1>{{ isRegister() ? 'Create Account' : 'Welcome Back' }}</h1>
    <p class="subtitle">
      {{ isRegister() ? 'Register a new user in Device Manager' : 'Sign in to continue' }}
    </p>

    <div class="mode-switch" role="tablist" aria-label="Authentication mode">
      <button
        type="button"
        [class.active]="!isRegister()"
        [attr.aria-selected]="!isRegister()"
        (click)="switchMode('login')"
      >
        Login
      </button>
      <button
        type="button"
        [class.active]="isRegister()"
        [attr.aria-selected]="isRegister()"
        (click)="switchMode('register')"
      >
        Register
      </button>
    </div>

    <form [formGroup]="authForm" (ngSubmit)="submit()" novalidate>
      @if (isRegister()) {
        <label>
          Name
          <input type="text" formControlName="name" autocomplete="name" />
          @if (authForm.controls.name.touched && authForm.controls.name.invalid) {
            <small>Name is required (min. 2 chars).</small>
          }
        </label>

        <label>
          Location
          <input type="text" formControlName="location" autocomplete="address-level2" />
          @if (authForm.controls.location.touched && authForm.controls.location.invalid) {
            <small>Location is required (min. 2 chars).</small>
          }
        </label>

        <label>
          Role
          <select formControlName="roleId" [disabled]="loadingRoles()">
            <option value="">Select role</option>
            @for (role of roles(); track role.id) {
              <option [value]="role.id">{{ role.name }}</option>
            }
          </select>
          @if (loadingRoles()) {
            <small>Loading roles...</small>
          }
          @if (roleLoadError()) {
            <small>
              {{ roleLoadError() }}
              <button type="button" class="inline-link" (click)="retryLoadRoles()">Try again</button>
            </small>
          }
          @if (authForm.controls.roleId.touched && authForm.controls.roleId.invalid) {
            <small>Role is required.</small>
          }
        </label>
      }

      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
        @if (authForm.controls.email.touched && authForm.controls.email.invalid) {
          <small>Enter a valid email address.</small>
        }
      </label>

      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
        @if (authForm.controls.password.touched && authForm.controls.password.invalid) {
          <small>Password must be at least 6 characters.</small>
        }
      </label>

      @if (errorMessage()) {
        <p class="message error">{{ errorMessage() }}</p>
      }

      @if (successMessage()) {
        <p class="message success">{{ successMessage() }}</p>
      }

      <button type="submit" class="submit-btn" [disabled]="loading() || (isRegister() && loadingRoles())">
        {{ loading() ? 'Please wait...' : isRegister() ? 'Create Account' : 'Login' }}
      </button>
    </form>
  </div>
</section>
